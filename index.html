<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>In Time Countdown</title>

<style>
body{
    margin:0;
    background:black;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial, sans-serif;
}

#setup{
    text-align:center;
}

input{
    width:80px;
    padding:10px;
    margin:5px;
    font-size:18px;
    text-align:center;
}

button{
    padding:10px 25px;
    font-size:18px;
    cursor:pointer;
}

#timer{
    display:none;
    color:#00ff66;
    font-size:6vw;
    letter-spacing:6px;

    text-shadow:
        0 0 5px #00ff66,
        0 0 10px #00ff66,
        0 0 20px #00ff66,
        0 0 40px #00ff66,
        0 0 80px #00ff66;
}
</style>
</head>

<body>

<div id="setup">
    <input id="years" placeholder="Years" type="number">
    <input id="days" placeholder="Days" type="number">
    <input id="hours" placeholder="Hours" type="number">
    <input id="minutes" placeholder="Minutes" type="number">
    <br><br>
    <button onclick="startCountdown()">Start</button>
</div>

<div id="timer">0000:000:00:00:00</div>

<script>

function startCountdown(){

    let years = Number(document.getElementById("years").value) || 0;
    let days = Number(document.getElementById("days").value) || 0;
    let hours = Number(document.getElementById("hours").value) || 0;
    let minutes = Number(document.getElementById("minutes").value) || 0;

    let totalSeconds =
        years*365*24*60*60 +
        days*24*60*60 +
        hours*60*60 +
        minutes*60;

    document.getElementById("setup").style.display = "none";
    document.getElementById("timer").style.display = "block";

    function update(){

        let y = Math.floor(totalSeconds/(365*24*60*60));
        let d = Math.floor((totalSeconds%(365*24*60*60))/(24*60*60));
        let h = Math.floor((totalSeconds%(24*60*60))/3600);
        let m = Math.floor((totalSeconds%3600)/60);
        let s = totalSeconds%60;

        document.getElementById("timer").textContent =
            String(y).padStart(4,'0') + ":" +
            String(d).padStart(3,'0') + ":" +
            String(h).padStart(2,'0') + ":" +
            String(m).padStart(2,'0') + ":" +
            String(s).padStart(2,'0');
    }

    update();

    let interval = setInterval(function(){

        totalSeconds--;

        if(totalSeconds < 0){
            clearInterval(interval);
            return;
        }

        update();

    },1000);
}

</script>

</body>
</html>
