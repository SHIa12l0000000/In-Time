<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>In Time Countdown</title>

<style>
body{
    margin:0;
    background:#000;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:#00ff66;
    font-family:Arial, sans-serif;
}

h2{
    color:#00ff66;
    margin-bottom:20px;
}

#timer{
    font-size:4vw;
    text-shadow:0 0 10px #00ff66,
                0 0 20px #00ff66,
                0 0 40px #00ff66;
    letter-spacing:5px;
}

.controls{
    margin-bottom:30px;
}

input{
    padding:10px;
    font-size:16px;
    width:250px;
}

button{
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>
<body>

<h2>Set Countdown Time</h2>

<div class="controls">
    <input type="number" id="years" placeholder="Years" min="0">
    <input type="number" id="days" placeholder="Days" min="0">
    <input type="number" id="hours" placeholder="Hours" min="0">
    <input type="number" id="minutes" placeholder="Minutes" min="0">
    <button onclick="startCountdown()">Start</button>
</div>

<div id="timer">0000:000:00:00:00</div>

<script>
let countdown;

function startCountdown() {

    clearInterval(countdown);

    let years = parseInt(document.getElementById("years").value) || 0;
    let days = parseInt(document.getElementById("days").value) || 0;
    let hours = parseInt(document.getElementById("hours").value) || 0;
    let minutes = parseInt(document.getElementById("minutes").value) || 0;

    let totalSeconds =
        years * 365 * 24 * 60 * 60 +
        days * 24 * 60 * 60 +
        hours * 60 * 60 +
        minutes * 60;

    countdown = setInterval(() => {

        if(totalSeconds <= 0){
            clearInterval(countdown);
            document.getElementById("timer").innerHTML =
            "0000:000:00:00:00";
            return;
        }

        totalSeconds--;

        let y = Math.floor(totalSeconds / (365*24*60*60));
        let d = Math.floor((totalSeconds % (365*24*60*60)) / (24*60*60));
        let h = Math.floor((totalSeconds % (24*60*60)) / 3600);
        let m = Math.floor((totalSeconds % 3600) / 60);
        let s = totalSeconds % 60;

        document.getElementById("timer").innerHTML =
            String(y).padStart(4,'0') + ":" +
            String(d).padStart(3,'0') + ":" +
            String(h).padStart(2,'0') + ":" +
            String(m).padStart(2,'0') + ":" +
            String(s).padStart(2,'0');

    },1000);
}
</script>

</body>
</html>
