<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>In Time Countdown</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

#timer{
    color:#00ff66;
    font-size:clamp(40px,7vw,120px);
    font-weight:300;
    letter-spacing:8px;

    text-shadow:
        0 0 5px #00ff66,
        0 0 10px #00ff66,
        0 0 20px #00ff66,
        0 0 40px #00ff66,
        0 0 80px #00ff66;
}
</style>
</head>

<body>

<div id="timer">0000:000:00:00:00</div>

<script>

// ==========================
// SET YOUR STARTING TIME HERE
// ==========================

const START_YEARS = 10;
const START_DAYS = 250;
const START_HOURS = 12;
const START_MINUTES = 30;

// ==========================

let totalSeconds =
      (START_YEARS * 365 * 24 * 60 * 60)
    + (START_DAYS * 24 * 60 * 60)
    + (START_HOURS * 60 * 60)
    + (START_MINUTES * 60);

function updateTimer() {

    if(totalSeconds < 0){
        totalSeconds = 0;
    }

    const years = Math.floor(
        totalSeconds / (365 * 24 * 60 * 60)
    );

    const days = Math.floor(
        (totalSeconds % (365 * 24 * 60 * 60))
        / (24 * 60 * 60)
    );

    const hours = Math.floor(
        (totalSeconds % (24 * 60 * 60))
        / 3600
    );

    const minutes = Math.floor(
        (totalSeconds % 3600)
        / 60
    );

    const seconds = totalSeconds % 60;

    document.getElementById("timer").textContent =
        String(years).padStart(4,"0") + ":" +
        String(days).padStart(3,"0") + ":" +
        String(hours).padStart(2,"0") + ":" +
        String(minutes).padStart(2,"0") + ":" +
        String(seconds).padStart(2,"0");
}

updateTimer();

setInterval(() => {

    if(totalSeconds > 0){
        totalSeconds--;
        updateTimer();
    }

}, 1000);

</script>

</body>
</html>
